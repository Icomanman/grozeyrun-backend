name: Deploy Edge Functions

on:
  push:
    branches:
      - serverless
      - main
    paths:
      - 'app.cjs'
      - 'auth.cjs'
      - 'db.cjs'
      - 'services.cjs'
      - 'validations.cjs'
      - 'package.json'
      - 'scripts/build-edge-functions.js'
      - '.github/workflows/deploy-edge-functions.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Edge Functions
        run: npm run build:edge

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions to Supabase
        run: |
          echo "🚀 Deploying sync-push..."
          supabase functions deploy sync-push --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          
          echo "🚀 Deploying sync-pull..."
          supabase functions deploy sync-pull --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Verify deployment
        run: |
          echo "📋 Deployed Functions:"
          supabase functions list --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            const message = `
            ## $${status} - Edge Functions Deployment
            
            **Branch**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            
            **Functions deployed**:
            - \`sync-push\` → POST /api/sync
            - \`sync-pull\` → GET /api/sync
            
            **View in Supabase**: [${{ secrets.SUPABASE_PROJECT_ID }}](https://app.supabase.com/project/${{ secrets.SUPABASE_PROJECT_ID }}/functions)
            `;
            
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message
              });
            }
        continue-on-error: true
