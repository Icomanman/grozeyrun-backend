name: Deploy Edge Functions

on:
  push:
    branches:
      - master
    paths:
      - 'app.cjs'
      - 'auth.cjs'
      - 'db.cjs'
      - 'services.cjs'
      - 'validations.cjs'
      - 'package.json'
      - 'scripts/build-edge-functions.js'
      - '.github/workflows/deploy-edge-functions.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Edge Functions
        run: npm run build:edge

      - name: Set up Supabase CLI
        run: |
          npm install -g supabase

      - name: Deploy Edge Functions to Supabase
        run: |
          supabase functions deploy sync-push \
            --project-id ${{ secrets.SUPABASE_PROJECT_ID }} \
            --no-verify
          supabase functions deploy sync-pull \
            --project-id ${{ secrets.SUPABASE_PROJECT_ID }} \
            --no-verify

      - name: Verify deployment
        run: |
          supabase functions list --project-id ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Create deployment comment
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Edge Functions deployed successfully!\n\n- sync-push: `POST /api/sync`\n- sync-pull: `GET /api/sync`'
            })
        continue-on-error: true
